<div class="h-screen bg-[#080805] text-white flex flex-col" style="font-family: 'Inter', sans-serif;">

  <app-navbar />

  <main class="flex-1 flex flex-col px-16 py-10 gap-8">

    <h1 class="text-5xl font-black uppercase tracking-tight">Solicitar lavado</h1>

    <form class="flex-1 flex flex-col gap-8">

      <!-- Nombre -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-black uppercase tracking-widest text-white/40">Nombre</label>
        <input type="text" placeholder="Tu nombre completo"
          class="bg-white/5 border border-white/10 rounded-xl px-6 py-5 text-lg text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
      </div>

      <!-- Tipo de lavado -->
      <div class="flex flex-col gap-4">
        <label class="text-sm font-black uppercase tracking-widest text-white/40">Tipo de lavado</label>
        <div class="grid grid-cols-3 gap-4">
          <app-tipo-lavado-card nombre="Básico"  [precio]="65"  />
          <app-tipo-lavado-card nombre="Medium"  [precio]="110" />
          <app-tipo-lavado-card nombre="Premium" [precio]="170" />
        </div>
      </div>

      <!-- Datos del carro -->
      <div class="flex flex-col gap-4">
        <label class="text-sm font-black uppercase tracking-widest text-white/40">Datos del carro</label>
        <div class="grid grid-cols-4 gap-4">
          <input type="text" placeholder="Marca"
            class="bg-white/5 border border-white/10 rounded-xl px-6 py-5 text-lg text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
          <input type="text" placeholder="Modelo"
            class="bg-white/5 border border-white/10 rounded-xl px-6 py-5 text-lg text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
          <input type="number" placeholder="Año"
            class="bg-white/5 border border-white/10 rounded-xl px-6 py-5 text-lg text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
          <input type="text" placeholder="Placa"
            class="bg-white/5 border border-white/10 rounded-xl px-6 py-5 text-lg text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
        </div>
      </div>

      <!-- Botón -->
      <div class="mt-auto">
        <button type="submit"
          class="w-full py-6 rounded-xl bg-[#00E5FF] text-[#080805] font-black uppercase tracking-widest text-lg hover:bg-[#00c8e0] transition-colors">
          Solicitar ahora
        </button>
      </div>

    </form>

  </main>

</div>
