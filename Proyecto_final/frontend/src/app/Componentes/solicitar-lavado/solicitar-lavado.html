<div class="h-screen bg-[#080805] text-white flex flex-col" style="font-family: 'Inter', sans-serif;">

  <app-navbar />

  <main class="flex-1 flex flex-col px-10 py-6 gap-5">

    <h1 class="text-3xl font-black uppercase tracking-tight">Solicitar lavado</h1>

    <!-- Nombre -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-black uppercase tracking-widest text-white/40">Nombre</label>
      <input #nombre type="text" placeholder="Nombre completo"
        class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
    </div>

    <!-- Tipo de lavado — al hacer click se guarda el tipo y precio seleccionado -->
    <div class="flex flex-col gap-3">
      <label class="text-xs font-black uppercase tracking-widest text-white/40">Tipo de lavado</label>
      <div class="grid grid-cols-3 gap-3">
        @for (tipo of tipos; track tipo.nombre) {
          <button type="button" (click)="seleccionar(tipo)"
            [class]="tipoSeleccionado.nombre === tipo.nombre
              ? 'rounded-xl p-4 flex flex-col gap-1 border bg-[#00E5FF]/10 border-[#00E5FF] text-left'
              : 'rounded-xl p-4 flex flex-col gap-1 border bg-white/5 border-white/10 hover:border-white/30 transition-colors text-left'">
            <p class="font-black text-sm">{{ tipo.nombre }}</p>
            <p class="text-xs text-white/40">Q{{ tipo.precio }}</p>
          </button>
        }
      </div>
    </div>

    <!-- Datos del carro -->
    <div class="flex flex-col gap-3">
      <label class="text-xs font-black uppercase tracking-widest text-white/40">Datos del carro</label>
      <div class="grid grid-cols-4 gap-3">
        <input #marca type="text" placeholder="Marca"
          class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
        <input #modelo type="text" placeholder="Modelo"
          class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
        <input #anio type="number" placeholder="Año"
          class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
        <input #placa type="text" placeholder="Placa"
          class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder:text-white/20 focus:border-[#00E5FF] focus:outline-none transition-colors">
      </div>
    </div>

    <div class="mt-auto">
      <button type="button"
        (click)="enviar(nombre.value, marca.value, modelo.value, anio.value, placa.value)"
        class="w-full py-3 rounded-xl bg-[#00E5FF] text-[#080805] font-black uppercase tracking-widest text-sm hover:bg-[#00c8e0] transition-colors">
        Solicitar ahora
      </button>
    </div>

  </main>

</div>
