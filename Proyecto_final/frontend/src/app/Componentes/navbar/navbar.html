
  <!-- Orbs de fondo -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
  <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-[#00E5FF] opacity-[0.07] blur-[150px] animate-float"></div>
  <div class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-[#0055ff] opacity-[0.06] blur-[180px] animate-float-reverse"></div>
</div>

<nav class="relative z-10 flex items-center px-8 py-2 bg-[#080805]" style="font-family: 'Inter', sans-serif;">
  <!-- LOGO UWASH -->
  <a routerLink="/" class="w-1/4 hover:opacity-80 transition-opacity">
    <img src="logo.png" alt="Uwash logo" class="h-16 w-auto">
  </a>

  <!-- LINKS -->
  <ul class="flex flex-1 justify-center items-center gap-8 text-xs font-black uppercase tracking-widest text-white/70">
    <li><a routerLink="/solicitar" class="hover:text-[#00E5FF] transition-colors">Solicitar</a></li>
    <li><a routerLink="/paquetes" class="hover:text-[#00E5FF] transition-colors">Paquetes</a></li>
    <li><a routerLink="/mi-orden" class="hover:text-[#00E5FF] transition-colors">Mi orden</a></li>
  </ul>

  <!-- BTN LOGIN / SALUDO + SIGN OUT -->
  <div class="w-1/4 flex justify-end items-center gap-3">

    <!-- @if revisa si auth.usuario() tiene valor (nombre del usuario) o es null (no logueado) -->
    @if (auth.usuario()) {

      <!-- Pill (pastilla) que agrupa avatar + nombre + botón de salir -->
      <div class="flex items-center gap-2 bg-white/5 border border-white/10 rounded-xl px-3 py-1.5">

        <!-- Avatar circular: muestra la primera letra del nombre en mayúscula -->
        <!-- charAt(0) = primer carácter | toUpperCase() = lo pone en mayúscula -->
        <div class="w-8 h-8 rounded-full bg-[#00E5FF] flex items-center justify-center text-[#080805] text-xs font-black flex-shrink-0">
          {{ auth.usuario()!.charAt(0).toUpperCase() }}
        </div>

        <!-- Texto: "Hola," arriba en gris pequeño, nombre abajo en blanco -->
        <!-- truncate + max-w-[100px] evita que un nombre muy largo rompa el diseño -->
        <div class="flex flex-col leading-none">
          <span class="text-[10px] text-white/40 uppercase tracking-widest">Hola,</span>
          <span class="text-sm font-bold text-white truncate max-w-[100px]">{{ auth.usuario() }}</span>
        </div>

        <!-- Botón de Sign out: llama a auth.logout() que borra localStorage y pone usuario en null -->
        <!-- Al ponerse null, el @if falla y Angular muestra el botón de Login automáticamente -->
        <button (click)="auth.logout()"
          class="ml-1 px-2 py-1 rounded-lg text-xs font-black uppercase tracking-widest text-white/40 hover:text-red-400 hover:bg-red-400/10 transition-colors">
          Salir
        </button>
      </div>

    } @else {
      <!-- Si no hay usuario logueado, se muestra el botón normal de Login -->
      <a routerLink="/login" class="px-7 py-2.5 text-xs font-black uppercase tracking-widest bg-[#00E5FF] text-[#080805] hover:bg-[#00c8e0] transition-colors rounded-lg">
        Login
      </a>
    }
  </div>
</nav>
