<div class="min-h-screen bg-gradient-to-br from-black to-[#021b1f] flex items-center justify-center p-6 text-white">

  <div class="w-full max-w-md bg-white/5 backdrop-blur-md border border-cyan-500/10 rounded-2xl p-8 shadow-lg">

    <h2 class="text-3xl font-bold text-center mb-2">Login</h2>
    <p class="text-center text-gray-400 mb-6">Accede a tu cuenta</p>

    <form class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm text-gray-300 mb-1">Correo</label>
        <input type="email" placeholder="correo@ejemplo.com"
          class="w-full p-3 rounded-lg bg-[#0b0f12] border border-gray-700 
                 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm text-gray-300 mb-1">Contraseña</label>
        <input type="password" placeholder="••••••••"
          class="w-full p-3 rounded-lg bg-[#0b0f12] border border-gray-700 
                 focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 outline-none">
      </div>

      <!-- Botón -->
      <button type="submit"
        class="w-full py-3 rounded-xl bg-cyan-400 text-black font-semibold 
               hover:bg-cyan-300 transition shadow-lg shadow-cyan-500/20">
        Iniciar sesión
      </button>

    </form>

  </div>

</div>
