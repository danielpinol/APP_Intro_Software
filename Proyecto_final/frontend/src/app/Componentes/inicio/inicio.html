<div class="min-h-screen bg-[#080805] text-white flex flex-col" style="font-family: 'Inter', sans-serif;">

  <app-navbar />

  <!-- Hero -->
  <main class="relative z-10 flex-1 flex flex-col items-center justify-center text-center px-6">

    <!-- Badge -->
    <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-white/10 text-white/50 text-xs font-bold uppercase tracking-widest mb-6">
      <span class="w-1.5 h-1.5 rounded-full bg-[#00E5FF]"></span>
      Car wash · Guatemala
    </span>

    <!-- Título — más pequeño en mobile, grande en desktop -->
    <h1 class="text-4xl sm:text-6xl font-black uppercase leading-none tracking-tight max-w-2xl">
      Tu carro,
      <span class="text-[#00E5FF]"> limpio</span>
      <br>cuando quieras.
    </h1>

    <!-- Subtítulo -->
    <p class="text-white/40 text-base mt-4 max-w-md leading-relaxed">
      Sin filas. Sin efectivo. Pide tu lavado desde aquí en segundos.
    </p>

    <!-- Botones — apilados en mobile, lado a lado en desktop -->
    <div class="flex flex-col sm:flex-row items-center gap-3 mt-6 w-full sm:w-auto">
      <a routerLink="/solicitar"
        class="w-full sm:w-auto px-6 py-3 bg-[#00E5FF] text-[#080805] font-black uppercase tracking-widest rounded-xl hover:bg-[#00c8e0] transition-colors text-sm text-center">
        Solicitar ahora
      </a>
      <a routerLink="/paquetes"
        class="w-full sm:w-auto px-6 py-3 border border-white/20 text-white font-black uppercase tracking-widest rounded-xl hover:border-[#00E5FF] hover:text-[#00E5FF] transition-colors text-sm text-center">
        Ver paquetes
      </a>
    </div>

  </main>

</div>
