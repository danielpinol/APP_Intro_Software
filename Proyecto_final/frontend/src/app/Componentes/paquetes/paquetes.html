<div class="h-screen bg-[#080805] text-white flex flex-col" style="font-family: 'Inter', sans-serif;">

  <app-navbar />

  <div class="px-10 pt-6 pb-4">
    <h1 class="text-3xl font-black uppercase tracking-tight">Planes mensuales</h1>
    <p class="text-white/40 mt-1 text-sm">Elige el plan que más se adapte a ti.</p>
  </div>

  <div class="flex flex-col flex-1 px-10 pb-6 gap-3">

    @for (paquete of paquetes; track paquete.nombre) {

      <div class="flex-1 flex items-center px-6 rounded-2xl bg-white/5 border border-white/10 hover:border-white/30 transition-all">

        <div class="w-1/4">
          <p class="text-xl font-black uppercase">{{ paquete.nombre }}</p>
        </div>

        <div class="w-1/4 flex items-center gap-3">
          <span class="text-4xl font-black leading-none">{{ paquete.lavados }}</span>
          <span class="text-white/40 text-xs leading-snug">lavados<br>al mes</span>
        </div>

        <div class="w-1/4">
          <p class="text-2xl font-black">{{ paquete.precio | currency:'GTQ':'Q ':'1.0-0' }}</p>
          <p class="text-white/40 text-xs mt-1">Ahorrás {{ paquete.ahorro | currency:'GTQ':'Q ':'1.0-0' }}</p>
        </div>

        <div class="w-1/4 flex justify-end">
          <button class="px-6 py-2.5 rounded-xl font-black uppercase tracking-widest text-xs border border-white/20 hover:border-[#00E5FF] hover:text-[#00E5FF] transition-colors">
            Suscribirme
          </button>
        </div>

      </div>
    }

  </div>

</div>
