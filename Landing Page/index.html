
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uwash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Fondo solo de HTML no hace nada. Se necesita de JS y se puede dibujar lo que sea -->
<canvas id="grid_canvas"></canvas>

<!-- Cursor totalmente personalizado -->
<div class="cursor" id="cursor"></div>

<!-- Slide1 - Titulo principal de landing page y subtitulo que se escribe solo -->
<div class="slides" data-s="0">
  <h1 class="main_title aparecer">Uwash</h1>
  <p class="texto_abajo_de_titulo">
    <span id="escribe_solo"></span><span class="cursor_blink"></span>
  </p>
</div>

<!-- slide 2: Validacion de mercado (Resultados de las encuestas a estudiantes de la UFM) -->
<div class = "slides Slide_1" data-s = "1">
  
<!-- Titulo de la diapositiva -->
  <p class="subtitle_slide aparecer">Validación de Mercado</p>
  <p class="texto_encuesta aparecer" style="transition-delay:.05s">encuesta · 31 personas respondieron</p>

  <div class="fila_stat">
    <div class="bloque_stat aparecer" style="transition-delay:.1s">
      <span class="nombre_stat">wash_frequency</span>
      <div class="numero_stat">
        <span class="contador_stat" data-target="32">0</span><span class="unidad_stat">%</span>
      </div>
      <span class="descripcion_stat">lava su auto solo<br>1 vez al mes</span>
    </div>
  </div>

</div>

  <script src="main.js"></script>
</body>
</html>
