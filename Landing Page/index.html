<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uwash</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles & Scripts Externos -->
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="main.js" defer></script>

    <!-- Tailwind Config -->
     <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#080805',
                        foreground: '#ffffff',
                        accent: '#00E5FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 20s ease-in-out infinite',
                        'float-reverse': 'float-reverse 25s ease-in-out infinite',
                        'shimmer': 'shimmer 3s infinite linear',
                        'glow-pulse': 'glow-pulse 4s infinite ease-in-out',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' },
                        },
                        'glow-pulse': {
                            '0%, 100%': { opacity: '0.3', filter: 'blur(15px)' },
                            '50%': { opacity: '0.6', filter: 'blur(25px)' },
                        },
                        drip: {
                            '0%': { transform: 'translateY(-10px) scale(0.9)', opacity: '0' },
                            '30%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                            '70%': { transform: 'translateY(5px) scale(1)', opacity: '1' },
                            '100%': { transform: 'translateY(15px) scale(0.8)', opacity: '0' },
                        },
                        splash: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.2) rotate(15deg)' },
                            '100%': { transform: 'scale(1)' },
                        },
                        'spin-slow': {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(100px, 50px) scale(1.1)' },
                        },
                        'float-reverse': {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(-100px, -50px) scale(0.9)' },
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="selection:bg-accent selection:text-black">

<!-- SCROLL PROGRESS BAR -->

<!-- Barra de progreso que aparece arriba y crece según el scroll -->
<div id="progress-bar"
    class="fixed top-0 left-0 h-[3px] bg-accent z-[100] transition-all duration-150 shadow-[0_0_10px_rgba(0,229,255,0.5)]"
    style="width: 0%">
</div>

<!-- BACKGROUND EFFECTS -->

<!-- Contenedor principal de efectos de fondo -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">

    <!-- ORB 1 (bola brillante) -->
    <div
        class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-accent opacity-[0.15] blur-[150px] animate-float">
    </div>

    <!-- ORB 2 (segunda bola brillante) -->
    <div
        class="absolute bottom-[-20%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-[#0055ff] opacity-[0.1] blur-[180px] animate-float-reverse">
    </div>

    <!-- GRID OVERLAY  -->
    <div
        class="absolute inset-0 bg-[url('data:image/svg+xml;base64,...')] opacity-50">
    </div>
    <!-- overlay de cuadrícula muy sutil | usa una imagen SVG en base64 como fondo -->

    <!-- PARTICLES (JS) -->
    <div id="particles-container"></div>
    <!-- Contenedor donde JavaScript insertará partículas animadas (por ejemplo con canvas o librerías como particles.js)-->

</div>

<!-- NAVBAR -->
<div class="fixed top-4 md:top-6 left-0 w-full px-4 md:px-8 z-50 flex justify-center">

    <nav
        class="w-full max-w-[1600px] flex items-center justify-between bg-[#1a1a1a]/70 backdrop-blur-xl border border-white/10 rounded-full px-6 md:px-8 py-3.5 shadow-2xl transition-all relative">
        <!-- Barra de navegación con fondo semitransparente + blur (efecto glassmorphism) -->

        <!-- Left: Logo -->
        <div class="flex items-center gap-2.5 cursor-pointer z-10 interactive-cursor">
            <!-- Logo + nombre -->
            <div class="w-4 h-4 rounded-full bg-accent shadow-[0_0_15px_rgba(0,229,255,0.4)]"></div>
            <span class="font-bold text-xl tracking-wide text-white">Uwash</span>
        </div>

        <!-- Center: Links -->
        <div
            class="absolute left-1/2 -translate-x-1/2 hidden md:flex items-center gap-8 text-sm text-white/70 font-medium">

            <a href="#como-funciona" class="hover:text-accent transition-colors interactive-cursor">
                ¿Cómo funciona?
            </a>
            <a href="#precios" class="hover:text-accent transition-colors interactive-cursor">Precios</a>
            <a href="#beneficios" class="hover:text-accent transition-colors interactive-cursor">Beneficios</a>
        </div>

        <!-- Right: Login / Sign Up -->
        <div class="flex items-center gap-6 text-sm text-white/70 font-medium z-10">
            
            <!-- Línea separadora (solo en desktop) -->
            <div class="hidden md:block w-[1px] h-4 bg-white/20"></div>

            <!-- Botón Login -->
            <a href="#"
                class="hover:text-accent transition-colors flex items-center gap-2 group interactive-cursor">
                <iconify-icon icon="solar:user-linear"
                    class="text-lg text-accent group-hover:scale-110 transition-transform"></iconify-icon>
                Log in
            </a>

            <!-- Botón Sign Up (CTA principal) -->
            <a href="#"
                class="bg-accent text-background px-5 py-2 rounded-full hover:bg-white hover:-translate-y-0.5 transition-all duration-300 interactive-cursor font-bold flex items-center gap-2 group">
                <iconify-icon icon="solar:user-plus-linear" class="text-lg"></iconify-icon>
                Sign Up
            </a>
        </div>

    </nav>
</div>


</html>
