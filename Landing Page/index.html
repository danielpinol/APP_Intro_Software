<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uwash</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles & Scripts Externos -->
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="main.js" defer></script>

    <!-- Tailwind Config -->
     <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#080805',
                        foreground: '#ffffff',
                        accent: '#00E5FF',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 20s ease-in-out infinite',
                        'float-reverse': 'float-reverse 25s ease-in-out infinite',
                        'shimmer': 'shimmer 3s infinite linear',
                        'glow-pulse': 'glow-pulse 4s infinite ease-in-out',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' },
                        },
                        'glow-pulse': {
                            '0%, 100%': { opacity: '0.3', filter: 'blur(15px)' },
                            '50%': { opacity: '0.6', filter: 'blur(25px)' },
                        },
                        drip: {
                            '0%': { transform: 'translateY(-10px) scale(0.9)', opacity: '0' },
                            '30%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                            '70%': { transform: 'translateY(5px) scale(1)', opacity: '1' },
                            '100%': { transform: 'translateY(15px) scale(0.8)', opacity: '0' },
                        },
                        splash: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.2) rotate(15deg)' },
                            '100%': { transform: 'scale(1)' },
                        },
                        'spin-slow': {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(100px, 50px) scale(1.1)' },
                        },
                        'float-reverse': {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(-100px, -50px) scale(0.9)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
     
</html>
